basePath: /
definitions:
  github_com_bernaddwiki_koda-b7-weekly10_internal_dto.ChangePasswordRequest:
    properties:
      current_password:
        minLength: 8
        type: string
      new_password:
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  github_com_bernaddwiki_koda-b7-weekly10_internal_dto.CheckPinRequest:
    properties:
      pin:
        type: string
    required:
