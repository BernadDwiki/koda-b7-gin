    type: object
  github_com_bernaddwiki_koda-b7-weekly10_internal_dto.CreateTopUpRequest:
    properties:
      amount:
        type: integer
      note:
        type: string
      payment_method_id:
        type: integer
    required:
    - amount
    - payment_method_id
    type: object
  github_com_bernaddwiki_koda-b7-weekly10_internal_dto.CreateTransferRequest:
    properties:
      amount:
        type: integer
      note:
        type: string
      pin:
        type: string
      receiver_id:
        type: integer
    required:
    - amount
    - pin
    - receiver_id
    type: object
  github_com_bernaddwiki_koda-b7-weekly10_internal_dto.EditPinRequest:
    properties:
      current_pin:
        type: string
      new_pin:
        type: string
    required:
    - current_pin
    - new_pin
    type: object
  github_com_bernaddwiki_koda-b7-weekly10_internal_dto.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  github_com_bernaddwiki_koda-b7-weekly10_internal_dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  github_com_bernaddwiki_koda-b7-weekly10_internal_dto.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  github_com_bernaddwiki_koda-b7-weekly10_internal_dto.ResetPasswordRequest:
    properties:
      new_password:
        minLength: 8
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  github_com_bernaddwiki_koda-b7-weekly10_internal_dto.Response:
    properties:
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  github_com_bernaddwiki_koda-b7-weekly10_internal_dto.SetPinRequest:
    properties:
      pin:
