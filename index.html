<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer>
        fetch("http://localhost:8080/").then(
            response => {
                if (!response.ok) throw new Error(`${response.status}: ${response.text()}`)
                    return response.json()
                }
        ).then(data => {
            console.log(data)
        }).catch(err => {
            console.error(err)
        })
    </script>
</head>

</html>
